# rag-stack model configuration
#
# Lists HuggingFace models to download to /opt/rag-stack/models/ and
# Ollama models to pull for inference. The 'fetch-model' script reads
# this file.
#
# Format (one model per non-comment line):
#   <purpose>/<source>   <model-id>
#
# purpose : embedding | reranking | inference
# source  : huggingface | ollama
#
# Ollama embedding models: pulled with 'fetch-model' (uses 'ollama pull').
# HuggingFace models: downloaded to /opt/rag-stack/models/ and mounted into
# the Open WebUI container at /root/.cache/huggingface/hub/ (read-only).
#
# To swap the active embedding model:
#   1. Comment out the current embedding line, uncomment the new one.
#   2. Run: fetch-model --all   (pulls Ollama models or downloads HF models)
#   3. Run: rag restart open-webui
#   4. Re-index all projects: rag index ~/Projects/<name>
#      (vector dimensions change with the model; existing KBs become stale)

# ==============================================================================
# Embedding — used by Open WebUI for document indexing and RAG search
# ==============================================================================

# nomic-embed-text via Ollama — 768-dim, fast, no container network needed.
# Pull with: ollama pull nomic-embed-text  (or: fetch-model)
embedding/ollama   nomic-embed-text

# HuggingFace alternatives (requires container outbound network access):
# embedding/huggingface   BAAI/bge-large-en-v1.5              # 1024-dim, high quality
# embedding/huggingface   BAAI/bge-small-en-v1.5              # 384-dim, faster, smaller

# ==============================================================================
# Reranking — optional cross-encoder re-ranking of retrieved chunks
# ==============================================================================

# Disabled by default. Enable in Open WebUI: Settings → Documents → Reranking Model.
# reranking/huggingface   BAAI/bge-reranker-base

# ==============================================================================
# Inference — Ollama models (reference only; pull manually with 'ollama pull')
# ==============================================================================

# inference/ollama   qwen2.5-coder:7b-instruct-q5_K_M   # Primary: coding + Symfony/PHP/Drupal
# inference/ollama   qwen3:8b-nothink                    # General dev Q&A
